# General Settings
set -g default-terminal "screen-256color"
set -g default-shell /bin/zsh
set -g history-limit 50000
set -g escape-time 10
set -g detach-on-destroy off
set -g focus-events on
set -g allow-passthrough on
set -g xterm-keys on
set -g mode-keys vi
set -g mouse on

# Status Line Configuration
set -g status-position bottom
set -g status-left-length 10
set -g status-interval 5

# Window and Pane Behavior
set -g base-index 1
set -g pane-base-index 1
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=#{?window_zoomed_flag,red,cyan},bg=default"

# Activity monitoring: subtle highlight on windows with new output
setw -g monitor-activity on
set -g visual-activity off
set -g display-panes-time 100000
set -g pane-border-status top
set -g pane-border-format " #[fg=brightblack]#P: #[fg=cyan]#{pane_current_command}#[fg=brightblack] in #[fg=magenta]#{pane_current_path} "

# Status Line Formats (Starship-matched palette)
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=green,bold] #S #[fg=brightblack]| "
set -g window-status-format "#{?window_activity_flag,#[fg=yellow#,bold],#[fg=brightblack]} #I #{?window_activity_flag,#[fg=yellow#,bold],#[fg=brightblack]}#{pane_current_command} #{?pane_synchronized,#[fg=yellow]💢 ,}#{?window_zoomed_flag,#[fg=yellow]🔍 ,}#[default]"
set -g window-status-current-format "#[fg=black,bg=#{?client_prefix,yellow,magenta},bold] ❯ #I #[fg=black,bg=#{?client_prefix,yellow,magenta}]#{pane_current_command} #{?pane_synchronized,💢,}#{?window_zoomed_flag,🔍,}#[default]"
set -g window-active-style 'bg=#000000'
set -g window-style 'bg=#0B0B0B'
set -g status-right "#{?client_prefix,#[fg=black#,bg=yellow#,bold] ◉ Tartarus #[default],#[fg=cyan,bold] Tartarus} #[fg=brightblack]| #[fg=yellow]%H:%M #[fg=brightblack]| #[fg=magenta]%d-%b-%y "
set -g @continuum-restore 'on'

# Key Bindings
unbind C-b
set -g prefix C-Space
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
